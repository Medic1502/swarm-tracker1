name: Update campaign views

on:
  schedule:
    - cron: "0 */6 * * *"    # svakih 6 sati (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # dugme "Run workflow" za rucno pokretanje

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install gspread google-auth requests

      - name: Run update script
        run: python update_views.py
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
